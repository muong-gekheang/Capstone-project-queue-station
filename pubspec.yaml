name: queue_station_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.2.4
  cloud_firestore: ^6.1.3
  fake_cloud_firestore: ^4.0.2+1

  # State management
  provider: ^6.1.5+1

  # Navigation
  go_router: ^17.1.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  fl_chart: ^0.69.0
  flutter_slidable: ^4.0.3
  dotted_line: ^3.2.3
  material_symbols_icons: ^4.2906.0
  google_fonts: ^8.0.1

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0

  # Utilities
  uuid: ^4.5.2
  image_picker: ^1.0.7
  shared_preferences: ^2.2.0
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/home_screen/
    - assets/images/
    - assets/icons/
    - assets/